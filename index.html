<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--white:#fff;--dim:rgba(255,255,255,0.5);--dimmer:rgba(255,255,255,0.25);--purple:#7F77DD;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Times New Roman',Georgia,serif;user-select:none;}

@media (pointer:coarse){ body{cursor:auto;} #waiting-cover-cursor{display:none!important;} }
@media (pointer:fine){ body{cursor:none;} }

/* ── LOADING SCREEN ── */
#loading-screen{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;transition:opacity 0.8s ease;}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.ls-rule{width:1px;height:80px;background:linear-gradient(to bottom,transparent,var(--purple),transparent);animation:lsPulse 1.8s ease-in-out infinite;}
@keyframes lsPulse{0%,100%{opacity:.3}50%{opacity:1}}
.ls-name{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:900;letter-spacing:.25em;color:#C8C8D0;line-height:1;}
.ls-sub{font-family:'Cormorant SC',serif;font-size:.48rem;letter-spacing:.5em;color:rgba(255,255,255,0.38);text-transform:uppercase;text-align:center;padding:0 1rem;}
.ls-bar{width:200px;height:1px;background:rgba(127,119,221,.2);overflow:hidden;position:relative;}
.ls-bar-fill{position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--purple),transparent);animation:lsBar 1.4s ease-in-out infinite;}
@keyframes lsBar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* ── MAIN SITE ── */
#site-wrap{opacity:0;transition:opacity 0.8s ease;}
#site-wrap.visible{opacity:1;}

/* ── STAGE ── */
#stage{position:fixed;inset:-3%;z-index:0;background:transparent;will-change:transform;}
#stage canvas{width:100%!important;height:100%!important;display:block;}

#lvo-logo-overlay{
  position:fixed;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  transition:opacity 0.7s ease;
}
#lvo-logo-overlay img{
  width:clamp(180px,28vw,380px);
  height:auto;
  filter:drop-shadow(0 0 30px rgba(139,0,0,0.6)) drop-shadow(0 0 8px rgba(0,0,0,0.9));
  animation:logoFloat 5s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}
#lvo-logo-overlay.hidden{opacity:0;}

/* ── TITLE ── */
#title{position:fixed;top:0;left:0;right:0;z-index:30;padding:clamp(14px,3vw,28px) clamp(16px,4vw,40px);}
#title a{text-decoration:none;color:var(--white);font-size:clamp(9px,2vw,13px);letter-spacing:0.3em;display:inline-flex;align-items:center;position:relative;}
#title-indicator{display:inline-block;width:40px;height:1px;background:var(--white);margin-left:12px;transform-origin:left center;transform:scaleX(0.75);transition:transform 0.4s;}
#title a:hover #title-indicator{transform:scaleX(1);}

/* ── STAGE NAV ── */
#stage-nav{position:fixed;top:50%;left:0;right:0;z-index:30;transform:translateY(-50%);overflow:hidden;pointer-events:none;}
#screen-page-nav{display:flex;list-style:none;transition:transform 0.8s cubic-bezier(0.77,0,0.175,1);will-change:transform;}
#screen-page-nav li{flex-shrink:0;display:flex;align-items:center;justify-content:center;pointer-events:all;}
#screen-page-nav li a{text-decoration:none;color:var(--white);font-size:clamp(22px,5vw,68px);letter-spacing:0.02em;line-height:1;display:block;padding:0 clamp(8px,2vw,20px);white-space:nowrap;font-family:'IM Fell English',Georgia,serif;font-style:italic;}

/* ── TRUE FOCUS: blur/unblur nav items ── */
#screen-page-nav li a {
  transition: opacity 0.4s ease, filter 0.55s ease;
}
#screen-page-nav li:not(.is-current) a {
  filter: blur(4px);
  opacity: 0.25;
}
#screen-page-nav li.is-current a {
  filter: blur(0px);
  opacity: 1;
}
.slide-mobile-btn {
  transition: filter 0.55s ease, color 0.4s ease !important;
}
#screen-page-nav li:not(.is-current) .slide-mobile-btn {
  filter: blur(4px);
  color: rgba(255,255,255,0.22) !important;
}
#screen-page-nav li.is-current .slide-mobile-btn {
  filter: blur(0px);
  color: rgba(255,255,255,1) !important;
}

/* ── MOBILE ── */
@media(max-width:768px){
  #about-text{
    left:0 !important;
    right:0 !important;
    width:100%;
    bottom:auto;
    top:62%;
    transform:translateY(-50%);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  #about-text.visible{ transform:translateY(-50%); }
  #about-text .about-lvo{ font-size:clamp(48px,12vw,72px); }

  #screen-page-nav li.has-mobile-btn{
    flex-direction:column;
    gap:16px;
    align-items:center;
    justify-content:center;
  }

  #screen-page-nav li.has-mobile-btn > a:first-of-type{
    display:none;
  }

  .slide-mobile-btn{
    display:inline-flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    border:none;
    outline:none;
    padding:10px 0;
    font-family:'Cinzel',serif;
    font-size:clamp(22px,5vw,68px);
    font-weight:400;
    letter-spacing:.02em;
    color:rgba(255,255,255,0.3);
    font-family:'IM Fell English',Georgia,serif;
    font-style:italic;
    text-transform:none;
    background:none;
    white-space:nowrap;
    pointer-events:all;
  }
  li.is-current .slide-mobile-btn{ color:rgba(255,255,255,1); }

  #screen-page-nav li[data-idx="2"],
  #screen-page-nav li[data-idx="3"],
  #screen-page-nav li[data-idx="4"]{
    margin-top:22vh;
  }

  #stage-nav{ top:62%; bottom:auto; transform:translateY(-50%); height:auto; overflow:visible; }
  #screen-page-nav li{ height:auto; min-height:80px; pointer-events:all; align-items:center; justify-content:center; }

  #screen-page-nav li[data-idx="1"]{ align-items:center; justify-content:center; }
  #screen-page-nav li[data-idx="0"]{ pointer-events:none; }
}

@media(min-width:769px){
  .slide-mobile-btn{ display:none !important; }
}

#screen-page-nav li.lvo-about{display:flex;align-items:center;justify-content:center;}
#screen-page-nav li.lvo-about .about-inner{text-align:center;opacity:0.85;}

#screen-page-nav li.lvo-about .about-inner .lvo-sub{font-size:clamp(7px,1.5vw,11px);letter-spacing:0.4em;color:var(--dimmer);display:block;margin-top:10px;}

.controller-item.is-symbol .numerator{font-size:clamp(11px,2vw,15px);letter-spacing:0;padding-bottom:6px;}
.controller-item.is-symbol.is-current .numerator{color:var(--white);}
.controller-item.is-symbol .numerator{color:var(--dimmer);}

/* ── BOTTOM CONTROLLER ── */
#screen-controller{position:fixed;bottom:0;left:50%;z-index:30;transform:translateX(-50%);padding-bottom:clamp(12px,3vw,20px);pointer-events:all;}
#screen-controller .inner{position:relative;display:flex;align-items:flex-end;}
#knob{position:absolute;bottom:0;left:0;display:flex;align-items:flex-end;transition:transform 0.8s cubic-bezier(0.77,0,0.175,1);pointer-events:none;z-index:2;}
.separator{display:block;width:1px;height:16px;background:var(--white);position:relative;bottom:-1px;}
.denominator{font-size:clamp(9px,2vw,11px);color:var(--dimmer);letter-spacing:0.1em;padding-left:6px;line-height:1;position:relative;bottom:3px;}
#controller-parent{list-style:none;display:flex;align-items:flex-end;border-bottom:0.5px solid rgba(255,255,255,0.2);}
#controller-parent li{cursor:pointer;}
.numerator{display:block;font-size:clamp(9px,2vw,11px);letter-spacing:0.1em;color:var(--dimmer);padding:0 clamp(5px,1.5vw,8px) 8px;transition:color 0.3s;line-height:1;}
#controller-parent li.is-current .numerator{color:var(--white);}

/* ── CUSTOM CURSOR ── */
#waiting-cover-cursor{position:fixed;pointer-events:none;z-index:900;width:52px;height:52px;margin-left:-26px;margin-top:-26px;}
#waiting-cover-cursor .inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
#waiting-cover-cursor img{width:26px;height:26px;animation:spin 1.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

@media (max-width:768px){
  #stage{inset:0;transform:none!important;will-change:auto;}
  #title a span:first-child{display:none;}

/* ── ABOUT BUTTON OVERLAY ── */
#about-text{
  position:fixed;
  bottom:clamp(80px,12vh,130px);
  left:clamp(40px,7vw,120px);

  pointer-events:all;
  opacity:0;
  transition:opacity 0.7s ease;
}
#about-text.visible{ opacity:1; }

#about-text .about-lvo{

  line-height:1;
  margin-bottom:1rem;

}
.about-btn{

  gap:14px;
  text-decoration:none;
  border:0.5px solid rgba(255,255,255,0.35);
  padding:12px 28px;
  font-family:'Cinzel',serif;
  font-size:clamp(8px,1vw,11px);
  font-weight:600;
  letter-spacing:.45em;
  color:rgba(255,255,255,0.85);
  text-transform:uppercase;
  background:rgba(0,0,0,0.28);
  backdrop-filter:blur(6px);
  transition:border-color 0.3s,color 0.3s,background 0.3s;

}
.about-btn:hover{
  border-color:var(--purple);

  background:rgba(127,119,221,0.12);
}
.about-btn-rule{
  display:inline-block;

  height:1px;
  background:currentColor;
  opacity:0.5;
  transition:width 0.3s;
}
.about-btn:hover .about-btn-rule{ width:36px; }

/* ── VIDEO BACKGROUND ── */
#video-bg{
  position:fixed;inset:0;z-index:5;

}
#video-bg.visible{ opacity:1; }
#stage{ z-index:10; background:#000; }
#stage.video-mode{
  z-index:4;
  background:transparent;
}
#stage.video-mode canvas{
  opacity:0;
}

<script>
// ─── DEVICE DETECTION ─────────────────────────────────────────────────────
const isMobileDevice = window.innerWidth <= 768;
const isTablet = window.innerWidth > 768 && window.innerWidth <= 1024;

let WATER_INTENSITY = 0.028;
if (isMobileDevice) {
  WATER_INTENSITY = 0.015;
} else if (isTablet) {
  WATER_INTENSITY = 0.022;
}

// ─── LOADING SCREEN ───────────────────────────────────────────────────────
const loadingScreen = document.getElementById('loading-screen');
const siteWrap      = document.getElementById('site-wrap');
function dismissLoader(){
  loadingScreen.classList.add('fade-out');
  siteWrap.classList.add('visible');
  setTimeout(()=>{ loadingScreen.style.display='none'; }, 900);
  startAutoAdvance();
}
setTimeout(dismissLoader, 2400);

// ─── SLIDES ────────────────────────────────────────────────────────────────
const ASSETS = 'https://assets.wearelvo.com/';

function getImageUrl(desktopImg, mobileImg) {
  return isMobileDevice ? mobileImg : desktopImg;
}

const SLIDES = [
  { label:'About',      img: ASSETS+'LVO%20R.jpg',      mobile_img: ASSETS+'LVO%20Mobile%20R.jpg' },
  { label:'Connect',    img: ASSETS+'LVO.jpg',          mobile_img: ASSETS+'LVO%20Mobile.JPG' },
  { label:'Vindex',     img: ASSETS+'Vindex.jpg',       mobile_img: ASSETS+'Vindex%20Mobile.JPG' },
  { label:'Alliance',   img: ASSETS+'Alliance.JPG',     mobile_img: ASSETS+'Alliance%20Mobile.JPG' },
  { label:'Operations', img: ASSETS+'Operations.jpg',   mobile_img: ASSETS+'Operations%20Mobile.JPG' },
];
const TOTAL = SLIDES.length;

const VIDEO_SLIDES = new Set([]);
const videoBg  = document.getElementById('video-bg');
const stageCanvas = document.querySelector('#stage');

function updateVideoBackground(idx){
  if(VIDEO_SLIDES.has(idx)){
    videoBg.classList.add('visible');
    stageCanvas.classList.add('video-mode');
  } else {
    videoBg.classList.remove('visible');
    stageCanvas.classList.remove('video-mode');
  }
}
updateVideoBackground(0);

// ─── THREE.JS ─────────────────────────────────────────────────────────────
const canvas = document.querySelector('#stage canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const geo    = new THREE.PlaneGeometry(2,2);

const vertSrc = `
varying vec2 vUv;
void main(){ vUv=uv; gl_Position=vec4(position,1.0); }
`;

const fragSrc = `
precision highp float;
uniform float uTime;
uniform float uIndex;
uniform float uBlend;
uniform float uPrev;
uniform sampler2D uTexA;
uniform sampler2D uTexB;
uniform int uHasTexA;
uniform int uHasTexB;
uniform float uWaterIntensity;
varying vec2 vUv;

float wave(vec2 p, float freq, float phase){
  return sin(p.x * freq + uTime * 0.3 + phase)
       * cos(p.y * freq * 0.8 + uTime * 0.2 + phase * 1.3);
}

void main(){
  vec2 uv = vUv;

  float w1 = wave(uv, 2.8,  0.0);
  float w2 = wave(uv, 4.9,  2.1);
  float w3 = wave(uv * 1.3, 1.9, 4.3);
  float w4 = wave(uv * 0.6, 6.2, 1.7);

  vec2 disp;
  disp.x = (w1*0.5 + w2*0.3 + w3*0.15 + w4*0.05) * uWaterIntensity;
  disp.y = (w2*0.5 + w1*0.25 + w4*0.2  + w3*0.05) * uWaterIntensity;
  vec2 wuv = clamp(uv + disp, 0.0, 1.0);

  vec3 colA, colB;

  if(uHasTexA == 1){
    colA = texture2D(uTexA, wuv).rgb * 0.82;
  } else {
    colA = vec3(0.04, 0.02, 0.12);
  }

  if(uHasTexB == 1){
    colB = texture2D(uTexB, wuv).rgb * 0.82;
  } else {
    colB = vec3(0.04, 0.02, 0.12);
  }

  float spec = max(0.0, w1 * 0.3 + w2 * 0.2 + 0.2);
  vec3 sheen = vec3(0.55, 0.52, 0.72) * pow(spec, 6.0) * 0.18;

  vec3 col = mix(colB, colA, clamp(uBlend, 0.0, 1.0));
  col += sheen;

  vec2 vig = uv * 2.0 - 1.0;
  col *= 1.0 - dot(vig, vig) * 0.38;

  float grain = fract(sin(dot(uv * 997.0, vec2(12.9898, 78.233))) * 43758.5453);
  col += grain * 0.018 - 0.009;

  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

function makePlaceholder(){
  const d=new Uint8Array([30,30,40,255]);
  const t=new THREE.DataTexture(d,1,1,THREE.RGBAFormat);
  t.needsUpdate=true; return t;
}

const placeholder = makePlaceholder();
const textures = new Array(TOTAL).fill(null);
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

SLIDES.forEach((s,i)=>{
  const imgUrl = getImageUrl(s.img, s.mobile_img);
  if(!imgUrl) return;
  loader.load(imgUrl, tex=>{
    tex.wrapS=tex.wrapT=THREE.ClampToEdgeWrapping;
    tex.minFilter=THREE.LinearFilter;
    textures[i]=tex;
    if(i===current){
      uniforms.uTexA.value=tex;
      uniforms.uHasTexA.value=1;
    }
  });
});

const uniforms = {
  uTime:           {value:0},
  uIndex:          {value:0},
  uPrev:           {value:0},
  uBlend:          {value:1},
  uTexA:           {value:placeholder},
  uTexB:           {value:placeholder},
  uHasTexA:        {value:0},
  uHasTexB:        {value:0},
  uWaterIntensity: {value:WATER_INTENSITY},
};

scene.add(new THREE.Mesh(geo, new THREE.ShaderMaterial({vertexShader:vertSrc,fragmentShader:fragSrc,uniforms})));

function resize(){ renderer.setSize(window.innerWidth, window.innerHeight); }
resize();
window.addEventListener('resize', resize);

// ─── NAV ──────────────────────────────────────────────────────────────────
let current=0, transitioning=false, transitionStart=0;
const TRANS_DUR=900;
const navUl=document.getElementById('screen-page-nav');
const ctrlUl=document.getElementById('controller-parent');
const knob=document.getElementById('knob');

function layoutNav(){
  const isMobile = window.innerWidth <= 768;
  const sw = isMobile ? window.innerWidth : window.innerWidth * 0.5;
  navUl.dataset.sw = sw;
  navUl.style.width=(sw*TOTAL)+'px';
  Array.from(navUl.children).forEach(li=>{ li.style.width=sw+'px'; li.style.minHeight='80px'; });
}
layoutNav();
window.addEventListener('resize', layoutNav);

const aboutText = document.getElementById('about-text');
function updateAboutText(idx){
  if(idx === 0) aboutText.classList.add('visible');
  else aboutText.classList.remove('visible');
}
updateAboutText(0);

function updateNav(idx){
  const sw = parseFloat(navUl.dataset.sw) || window.innerWidth * 0.5;
  navUl.style.transform=`translateX(${-(sw*idx-(window.innerWidth/2-sw/2))}px)`;
  Array.from(navUl.children).forEach((li,i)=>{
    li.classList.remove('is-current','is-prev','is-next');
    if(i===idx) li.classList.add('is-current');
    else if(i===idx-1) li.classList.add('is-prev');
    else if(i===idx+1) li.classList.add('is-next');
  });
  Array.from(ctrlUl.children).forEach((li,i)=>li.classList.toggle('is-current',i===idx));
  knob.style.transform=`translateX(${idx*(ctrlUl.offsetWidth/TOTAL)}px)`;
}
updateNav(0);

function goTo(idx){
  if(idx<0||idx>=TOTAL||transitioning||idx===current) return;
  transitioning=true;
  const prev=current; current=idx;
  const tA=textures[idx], tB=textures[prev];
  uniforms.uTexB.value=tB||placeholder; uniforms.uHasTexB.value=tB?1:0;
  uniforms.uTexA.value=tA||placeholder; uniforms.uHasTexA.value=tA?1:0;
  uniforms.uPrev.value=prev; uniforms.uIndex.value=idx; uniforms.uBlend.value=0;
  transitionStart=performance.now();
  updateNav(idx); resetProgress();
  updateVideoBackground(idx);
  updateAboutText(idx);
  setTimeout(()=>transitioning=false, TRANS_DUR+100);
}

// ─── INPUT ────────────────────────────────────────────────────────────────
Array.from(ctrlUl.children).forEach(li=>li.addEventListener('click',()=>goTo(+li.dataset.idx)));

let navDragMoved=false, navDragStartX=0;
navUl.addEventListener('pointerdown', e=>{ navDragStartX=e.clientX; navDragMoved=false; });
navUl.addEventListener('pointermove', e=>{ if(Math.abs(e.clientX-navDragStartX)>8) navDragMoved=true; });
navUl.addEventListener('click', e=>{
  const li=e.target.closest('li[data-idx]');
  if(!li) return;
  const idx=+li.dataset.idx, href=li.dataset.href;
  if(navDragMoved){ e.preventDefault(); goTo(idx); return; }
  if(idx===current){ if(href){ e.preventDefault(); window.location.href=href; } }
  else { e.preventDefault(); goTo(idx); }
}, true);

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(current+1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goTo(current-1);
});

let wCool=false;
window.addEventListener('wheel',e=>{
  if(wCool)return; wCool=true;
  if(e.deltaX>30||e.deltaY>30) goTo(current+1);
  else if(e.deltaX<-30||e.deltaY<-30) goTo(current-1);
  setTimeout(()=>wCool=false,900);
},{passive:true});

let stageDragX=0, stageDragging=false, stageDelta=0;

document.getElementById('stage').addEventListener('pointerdown',e=>{
  stageDragging=true; stageDragX=e.clientX; stageDelta=0;
  e.preventDefault();
},{passive:false});

window.addEventListener('touchstart', e=>{
  stageDragging=true;
  stageDragX=e.touches[0].clientX;
  stageDelta=0;
},{passive:true});

window.addEventListener('touchmove', e=>{
  if(stageDragging) stageDelta=e.touches[0].clientX - stageDragX;
},{passive:true});

window.addEventListener('touchend', ()=>{
  if(!stageDragging) return;
  stageDragging=false;
  if(stageDelta < -50) goTo(current+1);
  else if(stageDelta > 50) goTo(current-1);
  stageDelta=0;
});

window.addEventListener('pointermove',e=>{ if(stageDragging && e.pointerType!=='touch') stageDelta=e.clientX-stageDragX; });
window.addEventListener('pointerup',()=>{
  if(!stageDragging) return;
  stageDragging=false;
  if(stageDelta<-50) goTo(current+1);
  else if(stageDelta>50) goTo(current-1);
  stageDelta=0;
});

// ─── CURSOR ───────────────────────────────────────────────────────────────
const cursor=document.getElementById('waiting-cover-cursor');
const isTouchDevice = window.matchMedia('(pointer:coarse)').matches;
if(!isTouchDevice){
  window.addEventListener('mousemove',e=>{ cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; cursor.style.opacity='0.9'; });
  window.addEventListener('mouseleave',()=>cursor.style.opacity='0');
}

// ─── RENDER ───────────────────────────────────────────────────────────────
(function animate(ts){
  requestAnimationFrame(animate);
  uniforms.uTime.value=ts*0.001;
  if(uniforms.uBlend.value<1){
    const t=Math.min((ts-transitionStart)/TRANS_DUR,1);
    uniforms.uBlend.value=1-(1-t)*(1-t)*(1-t);
  }
  renderer.render(scene,camera);
})();

// ─── AUTO-ADVANCE ─────────────────────────────────────────────────────────
const AUTO_INTERVAL=12000;
let progressStart=0, autoRunning=false;
function resetProgress(){ progressStart=performance.now(); }
function startAutoAdvance(){
  if(autoRunning) return; autoRunning=true; progressStart=performance.now();
  (function tick(ts){
    requestAnimationFrame(tick);
    if(!autoRunning) return;
    const frac=Math.min((ts-progressStart)/AUTO_INTERVAL,1);
    if(frac>=1){ progressStart=ts; goTo((current+1)%TOTAL); }
  })();
}
ctrlUl.addEventListener('click',resetProgress);
navUl.addEventListener('click',resetProgress);
window.addEventListener('keydown',resetProgress);
window.addEventListener('wheel',resetProgress);
window.addEventListener('pointerup',resetProgress);
window.addEventListener('touchend',resetProgress);

// ─── PARALLAX TILT (desktop only) ─────────────────────────────────────────
const stageEl = document.getElementById('stage');
let mouseX=0, mouseY=0, tiltX=0, tiltY=0;
if(!isTouchDevice){
  window.addEventListener('mousemove', e=>{
    mouseX=(e.clientX/window.innerWidth-0.5)*2;
    mouseY=(e.clientY/window.innerHeight-0.5)*2;
  });
  window.addEventListener('mouseleave',()=>{ mouseX=0; mouseY=0; });
  (function tiltLoop(){
    requestAnimationFrame(tiltLoop);
    tiltX+=(mouseX-tiltX)*0.05; tiltY+=(mouseY-tiltY)*0.05;
    const rx=tiltY*4, ry=-tiltX*4, tx=tiltX*10, ty=tiltY*6;
    stageEl.style.transform=`perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) translate(${tx}px,${ty}px)`;
  })();
}
</script>
</body>
</html>
